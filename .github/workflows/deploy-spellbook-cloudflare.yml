name: Deploy Spellbook to Cloudflare Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Test spellbook
        run: pnpm turbo run test --filter=@open20/spellbook

      - name: Install Playwright browsers
        run: pnpm --filter @open20/spellbook exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm turbo run test:e2e --filter=@open20/spellbook
        env:
          CI: 'true'

      - name: Upload E2E test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/spellbook/playwright-report/
          retention-days: 30

      - name: Build spellbook
        run: pnpm turbo run build --filter=@open20/spellbook --force
        env:
          DEPLOY_TARGET: cloudflare-pages

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spellbook-dist
          path: packages/spellbook/dist/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: production
      url: https://spellbook.open-20.com

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: spellbook-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: open20-spellbook
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

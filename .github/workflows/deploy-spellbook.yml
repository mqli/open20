name: Deploy Spellbook

on:
  push:
    branches: [main]
    paths:
      - 'packages/spellbook/**'
      - 'packages/core/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build core
        run: pnpm --filter open20-core build

      - name: Test spellbook
        run: pnpm --filter @open20/spellbook test

      - name: Build spellbook
        run: pnpm --filter @open20/spellbook build
        env:
          DEPLOY_TARGET: github-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/spellbook/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

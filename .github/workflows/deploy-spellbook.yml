name: Deploy Spellbook

on:
  push:
    branches: [main]
    paths:
      - 'packages/spellbook/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - 'packages/config/**'
      - 'packages/content-*/**'
      - '.github/workflows/deploy-spellbook.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Test spellbook
        run: pnpm turbo run test --filter=@open20/spellbook

      - name: Install Playwright browsers
        run: pnpm --filter @open20/spellbook exec playwright install --with-deps chromium webkit

      - name: Build spellbook
        run: pnpm turbo run build --filter=@open20/spellbook
        env:
          DEPLOY_TARGET: github-pages

      - name: Run E2E tests
        run: pnpm turbo run test:e2e --filter=@open20/spellbook
        env:
          CI: 'true'

      - name: Upload E2E test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/spellbook/playwright-report/
          retention-days: 30

      - name: Prepare Pages artifact under spellbook path
        run: |
          mkdir -p pages/spellbook
          cp -R packages/spellbook/dist/. pages/spellbook/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
